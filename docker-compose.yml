version: "3.9"

services:
  lead-intake:
    container_name: lead-intake

    build:
      context: .
      target: deps

    working_dir: /app

    command: pnpm dev

    ports:
      - "3000:3000"

    env_file:
      - .env

    environment:
      NODE_ENV: development

    volumes:
      - .:/app
      - node_modules:/app/node_modules

    restart: unless-stopped

volumes:
  node_modules: